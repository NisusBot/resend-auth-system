<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - 仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #121212;
            color: #ffffff;
            min-height: 100vh;
            background-image: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: 700;
            color: #1db954;
        }

        .navbar .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .navbar .user-info span {
            color: #b3b3b3;
            font-size: 14px;
        }

        .navbar a {
            color: #1db954;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #1db954;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .navbar a:hover {
            background: rgba(29, 185, 84, 0.1);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .welcome {
            margin-bottom: 32px;
        }

        .welcome h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .welcome p {
            color: #b3b3b3;
            font-size: 14px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h2 {
            font-size: 16px;
            color: #b3b3b3;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .card .value {
            font-size: 28px;
            font-weight: 700;
            color: #1db954;
            margin-bottom: 4px;
        }

        .card .desc {
            color: #666;
            font-size: 12px;
        }

        .actions {
            margin-top: 32px;
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            background: #1db954;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #1ed760;
            transform: translateY(-1px);
        }

        @media (max-width: 600px) {
            .navbar { padding: 12px 16px; }
            .container { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">{{.Title}}</div>
        <div class="user-info">
            <span>{{.UserEmail}}</span>
            <a href="/music">音乐库</a>
            <a href="#" id="logoutBtn">退出</a>
        </div>
    </nav>

    <div class="container">
        <div class="welcome">
            <h1>欢迎回来 👋</h1>
            <p>邮箱验证码审核系统控制面板</p>
        </div>

        <div class="cards">
            <div class="card">
                <h2>账户状态</h2>
                <div class="value">已验证</div>
                <div class="desc">邮箱已通过验证,可访问全部功能</div>
            </div>
            <div class="card">
                <h2>登录邮箱</h2>
                <div class="value" style="font-size:18px;">{{.UserEmail}}</div>
                <div class="desc">当前登录用户</div>
            </div>
            <div class="card">
                <h2>主题</h2>
                <div class="value" style="font-size:22px;">{{.Theme}}</div>
                <div class="desc">系统当前主题</div>
            </div>
        </div>

        <div class="actions">
            <a class="btn" href="/music">前往音乐库</a>
        </div>
    </div>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('auth_token');
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
            } catch (_) {}
            localStorage.removeItem('auth_token');
            document.cookie = 'auth_token=; Max-Age=0; path=/';
            window.location.href = '/login';
        });
    </script>
</body>
</html>
