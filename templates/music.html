<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - 音乐库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #121212;
            color: #ffffff;
            min-height: 100vh;
            background-image: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: 700;
            color: #1db954;
        }

        .navbar .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .navbar .user-info span {
            color: #b3b3b3;
            font-size: 14px;
        }

        .navbar a {
            color: #1db954;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid #1db954;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .navbar a:hover {
            background: rgba(29, 185, 84, 0.1);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 26px;
        }

        .btn {
            padding: 10px 18px;
            background: #1db954;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #1ed760;
        }

        .btn:disabled {
            background: #535353;
            cursor: not-allowed;
        }

        .music-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .music-item {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .music-item:hover {
            transform: translateY(-2px);
        }

        .music-item .cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            background: linear-gradient(135deg, #1db954, #121212);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 12px;
        }

        .music-item h3 {
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-item .artist {
            color: #b3b3b3;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .music-item .duration {
            color: #666;
            font-size: 11px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty h3 {
            color: #b3b3b3;
            margin-bottom: 8px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff3333;
            color: #ff3333;
        }

        @media (max-width: 600px) {
            .navbar { padding: 12px 16px; }
            .container { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">{{.Title}}</div>
        <div class="user-info">
            <span>{{.UserEmail}}</span>
            <a href="/dashboard">仪表盘</a>
            <a href="#" id="logoutBtn">退出</a>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>🎵 音乐库</h1>
            <button class="btn" id="addBtn" disabled>添加音乐</button>
        </div>

        <div id="message" class="message"></div>
        <div id="musicList" class="music-list"></div>
        <div id="empty" class="empty" style="display:none;">
            <h3>暂无音乐</h3>
            <p>音乐库为空,稍后回来看看</p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function showError(text) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message error';
            el.style.display = 'block';
        }

        function formatDuration(seconds) {
            if (!seconds) return '—';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        async function loadMusic() {
            const token = localStorage.getItem('auth_token');
            const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
            try {
                const res = await fetch(`${API_BASE}/music`, { headers });
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                const list = (data && data.data) || [];
                const listEl = document.getElementById('musicList');
                const emptyEl = document.getElementById('empty');
                if (list.length === 0) {
                    listEl.innerHTML = '';
                    emptyEl.style.display = 'block';
                    return;
                }
                emptyEl.style.display = 'none';
                listEl.innerHTML = list.map(m => `
                    <div class="music-item">
                        <div class="cover">🎶</div>
                        <h3>${escapeHtml(m.title || '未命名')}</h3>
                        <div class="artist">${escapeHtml(m.artist || '未知艺术家')}</div>
                        <div class="duration">${formatDuration(m.duration)}</div>
                    </div>
                `).join('');
            } catch (err) {
                showError(err.message || '加载音乐列表失败');
            }
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('auth_token');
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
            } catch (_) {}
            localStorage.removeItem('auth_token');
            document.cookie = 'auth_token=; Max-Age=0; path=/';
            window.location.href = '/login';
        });

        loadMusic();
    </script>
</body>
</html>
