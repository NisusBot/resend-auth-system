<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #121212;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1db954;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #b3b3b3;
            font-size: 14px;
        }
        
        .login-card {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #b3b3b3;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #1db954;
            box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.2);
        }
        
        .form-control::placeholder {
            color: #666;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #1db954;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #1ed760;
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #535353;
            cursor: not-allowed;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider span {
            padding: 0 16px;
            color: #b3b3b3;
            font-size: 14px;
        }
        
        .verification-code {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .code-input {
            flex: 1;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .code-input::placeholder {
            color: #666;
            font-size: 16px;
        }
        
        .resend-btn {
            background: transparent;
            color: #1db954;
            border: 1px solid #1db954;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .resend-btn:hover {
            background: rgba(29, 185, 84, 0.1);
        }
        
        .resend-btn:disabled {
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid #1db954;
            color: #1db954;
        }
        
        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff3333;
            color: #ff3333;
        }
        
        .message.info {
            background: rgba(33, 150, 243, 0.1);
            border: 1px solid #2196f3;
            color: #2196f3;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 12px;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>{{.Title}}</h1>
            <p>邮箱验证码审核系统</p>
        </div>
        
        <div class="login-card">
            <div id="message" class="message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" class="form-control" placeholder="请输入您的邮箱" required>
                </div>
                
                <div class="form-group">
                    <label for="magicCode">魔法验证码</label>
                    <input type="text" id="magicCode" class="form-control" placeholder="请输入魔法验证码" required>
                </div>
                
                <button type="submit" class="btn" id="loginBtn">
                    <span>登录并发送验证码</span>
                </button>
            </form>
            
            <div id="verificationSection" style="display: none;">
                <div class="divider">
                    <span>邮箱验证码</span>
                </div>
                
                <div class="form-group">
                    <label>请输入6位验证码</label>
                    <div class="verification-code">
                        <input type="text" id="code1" class="form-control code-input" maxlength="1" placeholder="0">
                        <input type="text" id="code2" class="form-control code-input" maxlength="1" placeholder="0">
                        <input type="text" id="code3" class="form-control code-input" maxlength="1" placeholder="0">
                        <input type="text" id="code4" class="form-control code-input" maxlength="1" placeholder="0">
                        <input type="text" id="code5" class="form-control code-input" maxlength="1" placeholder="0">
                        <input type="text" id="code6" class="form-control code-input" maxlength="1" placeholder="0">
                    </div>
                </div>
                
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <button id="verifyBtn" class="btn" style="flex: 1; margin-right: 10px;">验证</button>
                    <button id="resendBtn" class="resend-btn" disabled>60秒后重发</button>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2024 Resend邮箱验证码审核系统 | 仅供内部使用</p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentEmail = '';
        let resendTimer = null;
        let resendSeconds = 60;
        
        function showMessage(text, type = 'info') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            if (type !== 'error') {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 5000);
            }
        }
        
        function setLoading(button, isLoading) {
            const btn = button;
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<div class="loading"></div>';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.getAttribute('data-original-text') || btn.textContent;
            }
        }
        
        function startResendTimer() {
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.disabled = true;
            resendBtn.textContent = `${resendSeconds}秒后重发`;
            
            resendTimer = setInterval(() => {
                resendSeconds--;
                if (resendSeconds <= 0) {
                    clearInterval(resendTimer);
                    resendBtn.disabled = false;
                    resendBtn.textContent = '重发验证码';
                    resendSeconds = 60;
                } else {
                    resendBtn.textContent = `${resendSeconds}秒后重发`;
                }
            }, 1000);
        }
        
        function getVerificationCode() {
            const code = [
                document.getElementById('code1').value,
                document.getElementById('code2').value,
                document.getElementById('code3').value,
                document.getElementById('code4').value,
                document.getElementById('code5').value,
                document.getElementById('code6').value
            ].join('');
            
            return code;
        }
        
        function clearVerificationCode() {
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`code${i}`).value = '';
            }
        }
        
        // 自动跳转到下一个输入框
        document.querySelectorAll('.code-input').forEach((input, index, inputs) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                
                // 验证所有6位是否已输入
                const code = getVerificationCode();
                if (code.length === 6) {
                    document.getElementById('verifyBtn').focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const magicCode = document.getElementById('magicCode').value.trim();
            
            if (!email || !magicCode) {
                showMessage('请输入邮箱和魔法验证码', 'error');
                return;
            }
            
            const loginBtn = document.getElementById('loginBtn');
            setLoading(loginBtn, true);
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        magic_code: magicCode
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('验证码已发送到邮箱，请查收', 'success');
                    currentEmail = email;
                    
                    // 显示验证码输入区域
                    document.getElementById('verificationSection').style.display = 'block';
                    document.getElementById('code1').focus();
                    
                    // 开始重发计时器
                    startResendTimer();
                } else {
                    showMessage(data.message || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('Login error:', error);
            } finally {
                setLoading(loginBtn, false);
            }
        });
        
        // 验证按钮点击
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const code = getVerificationCode();
            
            if (code.length !== 6) {
                showMessage('请输入6位验证码', 'error');
                return;
            }
            
            const verifyBtn = document.getElementById('verifyBtn');
            setLoading(verifyBtn, true);
            
            try {
                const response = await fetch(`${API_BASE}/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: currentEmail,
                        code: code
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('验证成功！正在跳转到仪表盘...', 'success');
                    
                    // 保存token到localStorage
                    if (data.data && data.data.token) {
                        localStorage.setItem('auth_token', data.data.token);
                    }
                    
                    // 跳转到仪表盘
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage(data.message || '验证失败', 'error');
                    clearVerificationCode();
                    document.getElementById('code1').focus();
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('Verify error:', error);
            } finally {
                setLoading(verifyBtn, false);
            }
        });
        
        // 重发验证码按钮
        document.getElementById('resendBtn').addEventListener('click', async () => {
            if (!currentEmail) return;
            
            const resendBtn = document.getElementById('resendBtn');
            setLoading(resendBtn, true);
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: currentEmail,
                        magic_code: document.getElementById('magicCode').value.trim()
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('验证码已重新发送', 'success');
                    clearVerificationCode();
                    document.getElementById('code1').focus();
                    
                    // 重置计时器
                    if (resendTimer) {
                        clearInterval(resendTimer);
                    }
                    startResendTimer();
                } else {
                    showMessage(data.message || '重发失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('Resend error:', error);
            } finally {
                setLoading(resendBtn, false);
            }
        });
        
        // 页面加载时检查是否已登录
        window.addEventListener('load', () => {
            const token = localStorage.getItem('auth_token');
            if (token) {
                // 验证token是否有效
                fetch(`${API_BASE}/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(response => {
                    if (response.ok) {
                        window.location.href = '/dashboard';
                    } else {
                        localStorage.removeItem('auth_token');
                    }
                })
                .catch(() => {
                    localStorage.removeItem('auth_token');
                });
            }
        });
    </script>
</body>
</html>
